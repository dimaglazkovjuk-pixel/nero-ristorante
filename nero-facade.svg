<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#010102"/>
      <stop offset="100%" stop-color="#07070a"/>
    </linearGradient>
    <linearGradient id="bld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#101010"/>
      <stop offset="100%" stop-color="#0b0b0b"/>
    </linearGradient>
    <linearGradient id="wint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1408"/>
      <stop offset="100%" stop-color="#0f0904"/>
    </linearGradient>
    <linearGradient id="st" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#030303"/>
    </linearGradient>
    <radialGradient id="wg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c97a" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#c9a84c" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dg" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <filter id="tg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lg2" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- SKY -->
  <rect width="1200" height="800" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="white">
    <circle cx="95"  cy="30" r="0.7" opacity="0.35"/>
    <circle cx="230" cy="18" r="0.5" opacity="0.28"/>
    <circle cx="410" cy="42" r="0.6" opacity="0.32"/>
    <circle cx="590" cy="22" r="0.5" opacity="0.25"/>
    <circle cx="750" cy="38" r="0.7" opacity="0.3"/>
    <circle cx="890" cy="15" r="0.5" opacity="0.28"/>
    <circle cx="1040" cy="45" r="0.6" opacity="0.32"/>
    <circle cx="1130" cy="28" r="0.5" opacity="0.25"/>
    <circle cx="160"  cy="52" r="0.4" opacity="0.2"/>
    <circle cx="680"  cy="50" r="0.5" opacity="0.22"/>
    <circle cx="980"  cy="55" r="0.4" opacity="0.2"/>
  </g>

  <!-- Moon (subtle crescent) -->
  <circle cx="1080" cy="55" r="18" fill="#0f0f12"/>
  <circle cx="1088" cy="50" r="14" fill="#1a1a22" opacity="0.9"/>

  <!-- ══ BUILDING ══ -->
  <rect x="60" y="62" width="1080" height="638" fill="url(#bld)"/>

  <!-- Top cornice -->
  <rect x="60"  y="60" width="1080" height="5"  fill="#c9a84c" opacity="0.20"/>
  <rect x="60"  y="65" width="1080" height="2"  fill="#c9a84c" opacity="0.08"/>
  <!-- Pediment triangle -->
  <path d="M560 44 L600 62 L640 44" fill="none" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.18"/>
  <!-- Top ornament -->
  <circle cx="600" cy="60" r="4" fill="#c9a84c" opacity="0.15"/>

  <!-- ══ UPPER FLOOR (y 62–275) ══ -->

  <!-- UW1 -->
  <rect x="92"  y="85" width="145" height="185" fill="url(#wint)" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.28"/>
  <rect x="92"  y="85" width="145" height="185" fill="url(#wg)"/>
  <path d="M92 85 Q164 58 237 85" fill="#101010" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.22"/>
  <line x1="164" y1="85"  x2="164" y2="270" stroke="#c9a84c" stroke-width="0.45" stroke-opacity="0.18"/>
  <line x1="92"  y1="177" x2="237" y2="177" stroke="#c9a84c" stroke-width="0.45" stroke-opacity="0.18"/>

  <!-- UW2 -->
  <rect x="285" y="85" width="145" height="185" fill="url(#wint)" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.28"/>
  <rect x="285" y="85" width="145" height="185" fill="url(#wg)"/>
  <path d="M285 85 Q357 58 430 85" fill="#101010" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.22"/>
  <line x1="357" y1="85"  x2="357" y2="270" stroke="#c9a84c" stroke-width="0.45" stroke-opacity="0.18"/>
  <line x1="285" y1="177" x2="430" y2="177" stroke="#c9a84c" stroke-width="0.45" stroke-opacity="0.18"/>

  <!-- Central NERO sign panel -->
  <rect x="462" y="72" width="276" height="190" fill="#0c0c0b" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.32"/>
  <rect x="470" y="80" width="260" height="174" fill="none" stroke="#c9a84c" stroke-width="0.3" stroke-opacity="0.14"/>
  <!-- Panel ornamental corners -->
  <path d="M462 72 L478 72 L478 74" fill="none" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.4"/>
  <path d="M738 72 L722 72 L722 74" fill="none" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.4"/>
  <path d="M462 262 L478 262 L478 260" fill="none" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.4"/>
  <path d="M738 262 L722 262 L722 260" fill="none" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.4"/>

  <!-- NERO main title -->
  <text x="600" y="192"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="88"
    font-weight="bold"
    fill="#c9a84c"
    text-anchor="middle"
    letter-spacing="20"
    filter="url(#tg)"
    opacity="0.92">NERO</text>

  <!-- Subtitle -->
  <text x="600" y="234"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11"
    fill="#c9a84c"
    text-anchor="middle"
    letter-spacing="6"
    opacity="0.45">RISTORANTE  ITALIANO</text>

  <!-- Decorative line in panel -->
  <line x1="520" y1="245" x2="680" y2="245" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.2"/>

  <!-- UW3 -->
  <rect x="770" y="85" width="145" height="185" fill="url(#wint)" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.28"/>
  <rect x="770" y="85" width="145" height="185" fill="url(#wg)"/>
  <path d="M770 85 Q842 58 915 85" fill="#101010" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.22"/>
  <line x1="842" y1="85"  x2="842" y2="270" stroke="#c9a84c" stroke-width="0.45" stroke-opacity="0.18"/>
  <line x1="770" y1="177" x2="915" y2="177" stroke="#c9a84c" stroke-width="0.45" stroke-opacity="0.18"/>

  <!-- UW4 -->
  <rect x="963" y="85" width="145" height="185" fill="url(#wint)" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.28"/>
  <rect x="963" y="85" width="145" height="185" fill="url(#wg)"/>
  <path d="M963 85 Q1035 58 1108 85" fill="#101010" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.22"/>
  <line x1="1035" y1="85"  x2="1035" y2="270" stroke="#c9a84c" stroke-width="0.45" stroke-opacity="0.18"/>
  <line x1="963"  y1="177" x2="1108" y2="177" stroke="#c9a84c" stroke-width="0.45" stroke-opacity="0.18"/>

  <!-- Upper window ambient glow (outer halos) -->
  <rect x="62"  y="70"  width="215" height="220" fill="url(#wg)" opacity="0.7"/>
  <rect x="255" y="70"  width="215" height="220" fill="url(#wg)" opacity="0.7"/>
  <rect x="740" y="70"  width="215" height="220" fill="url(#wg)" opacity="0.7"/>
  <rect x="933" y="70"  width="215" height="220" fill="url(#wg)" opacity="0.7"/>

  <!-- Mid cornice -->
  <rect x="60" y="278" width="1080" height="4" fill="#c9a84c" opacity="0.22"/>
  <rect x="60" y="283" width="1080" height="1" fill="#c9a84c" opacity="0.10"/>
  <!-- Dentil frieze (decorative bumps along cornice) -->
  <g fill="#c9a84c" opacity="0.10">
    <rect x="80"  y="273" width="10" height="6"/>
    <rect x="104" y="273" width="10" height="6"/>
    <rect x="128" y="273" width="10" height="6"/>
    <rect x="152" y="273" width="10" height="6"/>
    <rect x="176" y="273" width="10" height="6"/>
    <rect x="200" y="273" width="10" height="6"/>
    <rect x="224" y="273" width="10" height="6"/>
    <rect x="248" y="273" width="10" height="6"/>
    <rect x="900" y="273" width="10" height="6"/>
    <rect x="924" y="273" width="10" height="6"/>
    <rect x="948" y="273" width="10" height="6"/>
    <rect x="972" y="273" width="10" height="6"/>
    <rect x="996" y="273" width="10" height="6"/>
    <rect x="1020" y="273" width="10" height="6"/>
    <rect x="1044" y="273" width="10" height="6"/>
    <rect x="1068" y="273" width="10" height="6"/>
  </g>

  <!-- ══ GROUND FLOOR (y 284–700) ══ -->

  <!-- Outer pilasters -->
  <rect x="60"  y="284" width="26" height="416" fill="#0d0d0c"/>
  <line x1="86"  y1="284" x2="86"  y2="700" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.14"/>
  <rect x="1114" y="284" width="26" height="416" fill="#0d0d0c"/>
  <line x1="1114" y1="284" x2="1114" y2="700" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.14"/>

  <!-- LEFT GROUND WINDOW -->
  <rect x="100" y="340" width="248" height="308" fill="url(#wint)" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <rect x="100" y="340" width="248" height="308" fill="url(#wg)"/>
  <!-- Window arch -->
  <path d="M100 340 Q224 300 348 340" fill="#101010" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.24"/>
  <!-- Panes -->
  <line x1="224" y1="340" x2="224" y2="648" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <line x1="100" y1="494" x2="348" y2="494" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Glow halo around window -->
  <rect x="62"  y="316" width="324" height="356" fill="url(#wg)" opacity="0.85"/>

  <!-- Right pilaster (left of central section) -->
  <rect x="370" y="284" width="20" height="416" fill="#0d0d0c"/>
  <line x1="370" y1="284" x2="370" y2="700" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.12"/>

  <!-- RIGHT GROUND WINDOW -->
  <rect x="852" y="340" width="248" height="308" fill="url(#wint)" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <rect x="852" y="340" width="248" height="308" fill="url(#wg)"/>
  <path d="M852 340 Q976 300 1100 340" fill="#101010" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.24"/>
  <line x1="976"  y1="340" x2="976"  y2="648" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <line x1="852"  y1="494" x2="1100" y2="494" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <rect x="814" y="316" width="324" height="356" fill="url(#wg)" opacity="0.85"/>

  <!-- Left pilaster (right of central section) -->
  <rect x="810" y="284" width="20" height="416" fill="#0d0d0c"/>
  <line x1="830" y1="284" x2="830" y2="700" stroke="#c9a84c" stroke-width="0.4" stroke-opacity="0.12"/>

  <!-- ══ CENTRAL ENTRANCE ══ -->

  <!-- Awning/marquesina -->
  <path d="M395 310 L805 310 L814 372 L386 372 Z" fill="#0a0a09" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.28"/>
  <line x1="386" y1="372" x2="814" y2="372" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Awning fringe drops -->
  <g stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.15">
    <line x1="400" y1="372" x2="398" y2="380"/>
    <line x1="420" y1="372" x2="418" y2="380"/>
    <line x1="440" y1="372" x2="438" y2="380"/>
    <line x1="460" y1="372" x2="458" y2="380"/>
    <line x1="480" y1="372" x2="478" y2="380"/>
    <line x1="500" y1="372" x2="498" y2="380"/>
    <line x1="520" y1="372" x2="518" y2="380"/>
    <line x1="540" y1="372" x2="538" y2="380"/>
    <line x1="560" y1="372" x2="558" y2="380"/>
    <line x1="580" y1="372" x2="578" y2="380"/>
    <line x1="600" y1="372" x2="598" y2="380"/>
    <line x1="620" y1="372" x2="618" y2="380"/>
    <line x1="640" y1="372" x2="638" y2="380"/>
    <line x1="660" y1="372" x2="658" y2="380"/>
    <line x1="680" y1="372" x2="678" y2="380"/>
    <line x1="700" y1="372" x2="698" y2="380"/>
    <line x1="720" y1="372" x2="718" y2="380"/>
    <line x1="740" y1="372" x2="738" y2="380"/>
    <line x1="760" y1="372" x2="758" y2="380"/>
    <line x1="780" y1="372" x2="778" y2="380"/>
    <line x1="800" y1="372" x2="798" y2="380"/>
  </g>
  <!-- Awning text -->
  <text x="600" y="350"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10"
    fill="#c9a84c"
    text-anchor="middle"
    letter-spacing="7"
    opacity="0.38">RISTORANTE  ·  ALMAGRO  ·  MADRID</text>

  <!-- Wall lanterns -->
  <!-- Left lantern bracket -->
  <line x1="418" y1="378" x2="418" y2="398" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.45"/>
  <rect x="408" y="398" width="20" height="26" fill="#0d0d0c" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.5"/>
  <rect x="411" y="401" width="14" height="20" fill="#1a1208" stroke="none"/>
  <!-- Left flame -->
  <circle cx="418" cy="411" r="4" fill="#e8c97a" opacity="0.7"/>
  <!-- Left glow halo (blurred) -->
  <circle cx="418" cy="411" r="50" fill="url(#lg)"/>

  <!-- Right lantern bracket -->
  <line x1="782" y1="378" x2="782" y2="398" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.45"/>
  <rect x="772" y="398" width="20" height="26" fill="#0d0d0c" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.5"/>
  <rect x="775" y="401" width="14" height="20" fill="#1a1208" stroke="none"/>
  <!-- Right flame -->
  <circle cx="782" cy="411" r="4" fill="#e8c97a" opacity="0.7"/>
  <circle cx="782" cy="411" r="50" fill="url(#lg)"/>

  <!-- ENTRANCE DOOR -->
  <!-- Door frame -->
  <rect x="492" y="384" width="216" height="316" fill="#080807" stroke="#c9a84c" stroke-width="1.1" stroke-opacity="0.42"/>
  <!-- Door arch -->
  <path d="M492 384 Q600 352 708 384" fill="#080807" stroke="#c9a84c" stroke-width="0.9" stroke-opacity="0.32"/>
  <!-- Door split line (double door) -->
  <line x1="600" y1="384" x2="600" y2="700" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Left door panels -->
  <rect x="502"  y="394" width="90" height="100" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <rect x="502"  y="504" width="90" height="100" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <rect x="502"  y="612" width="90" height="78"  fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Right door panels -->
  <rect x="608" y="394" width="90" height="100" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <rect x="608" y="504" width="90" height="100" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <rect x="608" y="612" width="90" height="78"  fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Door handles -->
  <circle cx="596" cy="560" r="5" fill="#c9a84c" opacity="0.52"/>
  <circle cx="604" cy="560" r="5" fill="#c9a84c" opacity="0.52"/>
  <line x1="592" y1="560" x2="596" y2="560" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.4"/>
  <line x1="604" y1="560" x2="608" y2="560" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.4"/>
  <!-- Interior warm light spill under door -->
  <rect x="493" y="698" width="214" height="2" fill="#c9a84c" opacity="0.18"/>
  <!-- Door ambient glow -->
  <rect x="430" y="360" width="340" height="360" fill="url(#dg)"/>

  <!-- ══ BASE & STREET ══ -->

  <!-- Building base -->
  <rect x="60"  y="700" width="1080" height="10" fill="#0c0c0b"/>
  <line x1="60" y1="700" x2="1140" y2="700" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.20"/>
  <!-- Steps -->
  <rect x="456" y="710" width="288" height="8"  fill="#0d0d0c" stroke="#c9a84c" stroke-width="0.3" stroke-opacity="0.14"/>
  <rect x="474" y="718" width="252" height="6"  fill="#0e0e0d" stroke="#c9a84c" stroke-width="0.3" stroke-opacity="0.10"/>

  <!-- Street -->
  <rect x="0" y="724" width="1200" height="76" fill="url(#st)"/>

  <!-- Pavement joints -->
  <g stroke="#131312" stroke-width="0.7">
    <line x1="0" y1="742" x2="1200" y2="742"/>
    <line x1="0" y1="760" x2="1200" y2="760"/>
    <line x1="0" y1="778" x2="1200" y2="778"/>
  </g>

  <!-- Reflections on wet pavement -->
  <rect x="62"  y="724" width="324" height="55" fill="url(#wg)" opacity="0.28"/>
  <rect x="814" y="724" width="324" height="55" fill="url(#wg)" opacity="0.28"/>
  <rect x="388" y="724" width="424" height="55" fill="url(#lg)" opacity="0.18"/>

  <!-- Address -->
  <text x="600" y="790"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10"
    fill="#3e3c37"
    text-anchor="middle"
    letter-spacing="4">CALLE DE FORTUNY, 32  ·  ALMAGRO  ·  MADRID</text>

</svg>
